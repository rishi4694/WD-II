<!DOCTYPE html>

    <meta charset="UTF-8">

<body>
    <script>
        // function - block of code, used or defined to perform specific task
        // types of function 
        // normal function - with para, without para and with default
        
        // normal function without parameters...

        function demo(){
            console.log("Hello JS");
        }
        demo(); // function calling

        // with parameters
        function demo1(text){
            console.log("hello"+ text);
        }
        demo1("react");
        
        //default parameters
        function add(a,b=49){
            console.log("Addition is "+ (a+b));
        }
        add(123);

        //synchronised function

        function cal(){
            function mul(a,b){
                console.log(a*b);
            }

            function add1(a,b){
                console.log(a+b);
            }

            function sub(a,b){
                console.log(a-b);
            }
            mul(3,2);
            add1(4,8);
            sub(4,9);
  
        }

    cal();    
    //anonymous function 

    let msg= function(){
        console.log("hello ABES");
        console.log(typeof(msg));
    }
    msg();
    //short code for above function i.e. arrow function
    let msg1= ()=>console.log("hello ABESSSSS EC");
    msg1();
    // arrow function using multiple linnes

    let msg2=(a,b)=>{
        var num1= a;
        var num2= b;
        var res= num1/num2;
        console.log("result is "+ res);
    }
    msg2(10,423);

    //IIFE - 

    (function(){
        console.log("Hello World!");
    })();

    // short code for above function
    (msg=> console.log("Hello"))();

    // A Promise in JavaScript is an object representing the eventual completion or failure of an asynchronous operation, acting as a placeholder for a future result


    let myPromise=new Promise(function(resolve,reject){
        let age=25;
        if (age>=18){
            resolve("valid age");}
            else{
                reject("wait for next year");
            }
        }
    );
    myPromise
    .then(msg=>console.log(msg))
    .catch(error=>console.log(error));
    console.log(myPromise);

    // In JavaScript, async and await are keywords used to write asynchronous code that looks and behaves like synchronous code, making it easier to read and maintain compared to standard promise chaining.

    // Higher order function:-

// map(): Transforms every element in an array and returns a new array of the same length.
// filter(): Creates a new array containing only the elements that satisfy a specific condition.
// reduce(): Processes an array to return a single value (e.g., sum, average) based on an accumulator logic.
// forEach(): Executes a provided function once for each array element (primarily used for side effects like logging).
// find(): Returns the first element in an array that satisfies a given condition.

let num=[4,6,7,8,9,3,2,1];

// map
let square=num.map(n=>n*n);
console.log(square)

// reduce
let sum=num.reduce((total,n)=>total+n);
console.log(sum);

// filter
let sort=num.filter(n=>n>2);
console.log(sort);

// forEach
num.forEach(n=>console.log(n*2));

    name:'Soyanshu',

localStorage.setItem('myInfo',JSON.stringify(myInfo));
let storeData=JSON.parse(localStorage.getItem('myInfo'));
