<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data types in JS</title>
</head>
<body>
    <script>
        // JS data value types
        // primitive - immutable single value data type in js
        //string, number, boolean, undefined, Null, BgInt and Symbol

        // string
        var myName="Viaks Singh";
        console.log(myName);

        // number
        var myMob="9958767644";
        console.log(myMob);

        // Boolean
        var isMarried="false";
        console.log(myName + "is married ? "+isMarried);

        // undefined
        var myEmail;
        console.log(myEmail);
        console.log(typeof(myEmail));

        //null
        var myAddress=null;
        console.log(myAddress);

        // big int
        var myNum=BigInt(666788987767645456567);
        console.log(myNum);
        console.log(typeof(myNum));

        // symbol
        var var1=Symbol("Vikas");
        var var2=Symbol("Vikas");
        console.log(var1==var2);

        // Reference Type(object)-- mutable in memory and keep the data in key value pair 
        // object {}, function(), array[]

        let myInfo={
            name:"Soyanshu",
            age:19,
            isMarried:false,
            address:"Ghaziabad",
            branch:"CSE",
            section:23
        };
        console.log(myInfo);
        console.log(myInfo.name);

        //object length
        var keys=Object.keys(myInfo);
        console.log(keys.length);

        // function--block of code to perform particular task

        function cal(){
            var num1=152;
            var num2=74;
            var add=num1+num2;
            console.log("addition of two number is "+ add);
        }

        // array--collection of any datatype

        let studentlist=["soyanshu","suyash","suryansh"];
        console.log(studentlist[0]);

        // for different data type
        let st1=["popatlal",20,false,"GZB", "CSE", null, 18];
        console.log(st1);
        console.log(st1.length);




    </script>
</body>
</htm
