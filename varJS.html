<body>
    <script>

        var my_name="Soyanshu";       //global
        document.write(my_name);
        console.log(my_name);

        var my_name="Rishi";
        console.log(my_name);

        function demo(){
            var msg="Hello ABES";
            console.log(msg);
        }
        demo();
        // variable declariation using let and const

        let num="1234567895";     
        console.log(num);     

        let nm="66787654387";     // no redeclare but reassign
        console.log(num);                              

        const email="abcd@gmail.com";
        console.log(email);

        // JS Execution
        // JS Scope
        // variable declaration
        // diffrence among var, let, const
    </script> 
</body>
</html>
